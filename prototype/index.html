<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LCC IT Student Portal — BSIT Prototype</title>
<style>
  :root{
    --navy-950:#081a33;
    --navy-900:#0b2447;
    --navy-800:#123262;
    --navy-700:#19407c;
    --navy-600:#1f4e96;
    --navy-500:#2a5fb0;
    --navy-100:#e8eef7;
    --navy-50:#f4f7fc;
    --white:#ffffff;
    --ink:#1a2333;
    --ink-soft:#5a6779;
    --line:#dde4ee;
    --green:#15803d; --green-bg:#dcfce7;
    --amber:#b45309; --amber-bg:#fef3c7;
    --red:#b91c1c;   --red-bg:#fee2e2;
    --blue:#1d4ed8;  --blue-bg:#dbeafe;
    --radius:10px;
    --shadow:0 1px 3px rgba(11,36,71,.08), 0 4px 16px rgba(11,36,71,.06);
    --font:'Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:var(--font);color:var(--ink);background:var(--navy-50);font-size:14.5px;line-height:1.5}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px}
  a{color:var(--navy-600);text-decoration:none}
  ::selection{background:var(--navy-600);color:#fff}

  /* ---------- generic ---------- */
  .btn{display:inline-flex;align-items:center;gap:7px;border:none;border-radius:8px;padding:9px 16px;font-size:14px;font-weight:600;transition:.15s}
  .btn-primary{background:var(--navy-800);color:#fff}
  .btn-primary:hover{background:var(--navy-600)}
  .btn-outline{background:#fff;color:var(--navy-800);border:1.5px solid var(--navy-800)}
  .btn-outline:hover{background:var(--navy-100)}
  .btn-ghost{background:transparent;color:var(--ink-soft)}
  .btn-ghost:hover{background:var(--navy-100);color:var(--navy-800)}
  .btn-danger{background:var(--red);color:#fff}
  .btn-sm{padding:5px 11px;font-size:12.5px;border-radius:6px}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .card-pad{padding:20px}
  .card h3{font-size:15px;color:var(--navy-900);margin-bottom:12px}
  .badge{display:inline-flex;align-items:center;gap:5px;padding:2.5px 10px;border-radius:99px;font-size:11.5px;font-weight:700;letter-spacing:.02em}
  .b-present{background:var(--green-bg);color:var(--green)}
  .b-late{background:var(--amber-bg);color:var(--amber)}
  .b-absent{background:var(--red-bg);color:var(--red)}
  .b-excused{background:var(--blue-bg);color:var(--blue)}
  .b-navy{background:var(--navy-100);color:var(--navy-800)}
  .b-open{background:var(--green-bg);color:var(--green)}
  .b-pending{background:var(--amber-bg);color:var(--amber)}
  .b-approved{background:var(--green-bg);color:var(--green)}
  .b-rejected{background:var(--red-bg);color:var(--red)}
  .b-gray{background:#eef1f6;color:var(--ink-soft)}
  table{width:100%;border-collapse:collapse}
  th{font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);text-align:left;padding:10px 14px;border-bottom:2px solid var(--line);background:var(--navy-50)}
  td{padding:11px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tbody tr:hover{background:var(--navy-50)}
  .table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);background:#fff;box-shadow:var(--shadow)}
  .toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px}
  .toolbar input[type=search],.toolbar select,.filter-input{padding:8px 12px;border:1px solid var(--line);border-radius:8px;background:#fff;outline:none;min-width:160px}
  .toolbar input:focus,.filter-input:focus{border-color:var(--navy-600);box-shadow:0 0 0 3px rgba(31,78,150,.12)}
  .pagination{display:flex;gap:6px;align-items:center;justify-content:flex-end;padding:12px 14px;color:var(--ink-soft);font-size:13px}
  .pagination button{border:1px solid var(--line);background:#fff;border-radius:6px;padding:4px 10px}
  .pagination button.active{background:var(--navy-800);color:#fff;border-color:var(--navy-800)}
  .grid{display:grid;gap:16px}
  .cols-2{grid-template-columns:repeat(2,1fr)}
  .cols-3{grid-template-columns:repeat(3,1fr)}
  .cols-4{grid-template-columns:repeat(4,1fr)}
  @media(max-width:1100px){.cols-4{grid-template-columns:repeat(2,1fr)}.cols-3{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:640px){.cols-4,.cols-3,.cols-2{grid-template-columns:1fr}}
  .muted{color:var(--ink-soft)}
  .small{font-size:12.5px}
  .mono{font-family:Consolas,monospace}
  .avatar{width:34px;height:34px;border-radius:50%;background:var(--navy-700);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
  .avatar.lg{width:64px;height:64px;font-size:22px}

  /* ---------- landing ---------- */
  .landing{min-height:100vh;background:linear-gradient(160deg,var(--navy-950) 0%,var(--navy-900) 45%,var(--navy-700) 100%);color:#fff;display:flex;flex-direction:column}
  .landing-nav{display:flex;justify-content:space-between;align-items:center;padding:22px 6vw}
  .brand{display:flex;align-items:center;gap:12px;font-weight:800;font-size:17px;letter-spacing:.02em}
  .brand .logo{width:40px;height:40px;border-radius:10px;background:#fff;color:var(--navy-900);display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:900}
  .hero{flex:1;display:flex;align-items:center;gap:5vw;padding:40px 6vw 60px;flex-wrap:wrap}
  .hero-copy{max-width:560px}
  .hero-copy .eyebrow{display:inline-block;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);padding:5px 14px;border-radius:99px;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:22px}
  .hero-copy h1{font-size:clamp(30px,4.2vw,46px);line-height:1.12;margin-bottom:18px}
  .hero-copy p{color:#c6d4ea;font-size:16px;margin-bottom:28px}
  .hero-qr{background:#fff;border-radius:18px;padding:26px;box-shadow:0 24px 60px rgba(0,0,0,.35);text-align:center;color:var(--ink)}
  .hero-qr .small{margin-top:12px}
  .feat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;padding:0 6vw 60px}
  .feat{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:14px;padding:20px}
  .feat .ic{font-size:22px;margin-bottom:10px}
  .feat b{display:block;margin-bottom:6px;font-size:15px}
  .feat span{color:#b9c9e2;font-size:13px}
  .landing-foot{padding:18px 6vw;border-top:1px solid rgba(255,255,255,.12);color:#8fa5c6;font-size:12.5px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}

  /* ---------- login ---------- */
  .login-wrap{min-height:100vh;display:grid;grid-template-columns:1.1fr 1fr}
  @media(max-width:900px){.login-wrap{grid-template-columns:1fr}.login-side{display:none}}
  .login-side{background:linear-gradient(165deg,var(--navy-950),var(--navy-800));color:#fff;display:flex;flex-direction:column;justify-content:space-between;padding:44px 48px}
  .login-side h2{font-size:30px;line-height:1.2;margin:24px 0 14px}
  .login-side p{color:#b9c9e2;max-width:420px}
  .login-main{display:flex;align-items:center;justify-content:center;padding:40px 24px;background:#fff}
  .login-box{width:100%;max-width:400px}
  .login-box h1{font-size:24px;color:var(--navy-900);margin-bottom:6px}
  .login-box>p{color:var(--ink-soft);margin-bottom:26px}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--navy-900);margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;padding:10px 13px;border:1.5px solid var(--line);border-radius:8px;outline:none;transition:.15s}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--navy-600);box-shadow:0 0 0 3px rgba(31,78,150,.12)}
  .demo-roles{margin-top:24px;border-top:1px dashed var(--line);padding-top:18px}
  .demo-roles p{font-size:12px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-soft);font-weight:700;margin-bottom:10px}
  .demo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .demo-grid button{padding:10px;border:1.5px solid var(--line);background:#fff;border-radius:8px;font-weight:600;font-size:13px;color:var(--navy-800);transition:.15s;text-align:left}
  .demo-grid button:hover{border-color:var(--navy-600);background:var(--navy-50)}
  .demo-grid button small{display:block;font-weight:400;color:var(--ink-soft);font-size:11.5px}

  /* ---------- app shell ---------- */
  .shell{display:flex;min-height:100vh}
  .sidebar{width:248px;background:var(--navy-900);color:#cbd8ec;display:flex;flex-direction:column;position:fixed;inset:0 auto 0 0;z-index:40;transition:transform .2s}
  .sidebar .brand{padding:18px 18px 14px;color:#fff;border-bottom:1px solid rgba(255,255,255,.09)}
  .sidebar .brand .logo{width:34px;height:34px;font-size:16px}
  .nav-scroll{flex:1;overflow-y:auto;padding:12px 10px 20px}
  .nav-group{font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:#7e93b5;padding:16px 12px 6px;font-weight:700}
  .nav-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:8px;color:#cbd8ec;font-size:14px;font-weight:500;margin-bottom:2px;position:relative}
  .nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
  .nav-item.active{background:#fff;color:var(--navy-900);font-weight:700}
  .nav-item .ic{width:20px;text-align:center;font-size:15px}
  .nav-item .count{margin-left:auto;background:var(--red);color:#fff;font-size:10.5px;font-weight:700;border-radius:99px;padding:1px 7px}
  .nav-item.active .count{background:var(--red)}
  .side-foot{padding:14px;border-top:1px solid rgba(255,255,255,.09);font-size:11.5px;color:#7e93b5}
  .main{flex:1;margin-left:248px;display:flex;flex-direction:column;min-width:0}
  .topbar{height:60px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:0 22px;position:sticky;top:0;z-index:30}
  .topbar .search{flex:1;max-width:420px;position:relative}
  .topbar .search input{width:100%;padding:8px 13px 8px 36px;border:1px solid var(--line);border-radius:99px;background:var(--navy-50);outline:none}
  .topbar .search .ic{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--ink-soft)}
  .icon-btn{position:relative;width:38px;height:38px;border-radius:50%;border:none;background:transparent;font-size:17px;color:var(--navy-800)}
  .icon-btn:hover{background:var(--navy-100)}
  .icon-btn .dot{position:absolute;top:6px;right:6px;background:var(--red);color:#fff;font-size:9.5px;font-weight:700;border-radius:99px;padding:0 4.5px;line-height:14px}
  .role-pill{display:flex;align-items:center;gap:9px;padding:5px 12px 5px 6px;border:1px solid var(--line);border-radius:99px;background:#fff}
  .role-pill b{font-size:13px;color:var(--navy-900);line-height:1.15;display:block}
  .role-pill small{font-size:11px;color:var(--ink-soft)}
  .content{padding:26px 28px 60px;max-width:1280px;width:100%;margin:0 auto}
  .breadcrumbs{font-size:12.5px;color:var(--ink-soft);margin-bottom:6px}
  .breadcrumbs a{color:var(--ink-soft)}
  .breadcrumbs a:hover{color:var(--navy-700)}
  .page-head{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:22px}
  .page-head h1{font-size:23px;color:var(--navy-900)}
  .page-head .sub{color:var(--ink-soft);margin-top:3px}
  .hamb{display:none}
  @media(max-width:1023px){
    .sidebar{transform:translateX(-100%)}
    body.side-open .sidebar{transform:none;box-shadow:0 0 0 100vmax rgba(8,26,51,.45)}
    .main{margin-left:0}
    .hamb{display:inline-flex}
    .content{padding:20px 16px 60px}
  }

  /* stat cards */
  .stat{display:flex;gap:14px;align-items:center;padding:18px}
  .stat .ic{width:46px;height:46px;border-radius:12px;background:var(--navy-100);color:var(--navy-800);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
  .stat .val{font-size:23px;font-weight:800;color:var(--navy-900);line-height:1.1}
  .stat .lbl{font-size:12.5px;color:var(--ink-soft)}
  .stat .trend{margin-left:auto;font-size:12px;font-weight:700}
  .trend.up{color:var(--green)} .trend.down{color:var(--red)}

  /* attendance ring */
  .ring-wrap{display:flex;align-items:center;gap:20px}
  .ring{position:relative;width:120px;height:120px;flex-shrink:0}
  .ring svg{transform:rotate(-90deg)}
  .ring .pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;font-size:24px;color:var(--navy-900)}
  .ring .pct small{font-size:10.5px;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:11px}
  .bar-row .lbl{width:78px;font-size:12.5px;font-weight:600;color:var(--navy-900);flex-shrink:0}
  .bar-track{flex:1;height:9px;background:var(--navy-100);border-radius:99px;overflow:hidden}
  .bar-fill{height:100%;background:var(--navy-700);border-radius:99px}
  .bar-row .v{width:40px;text-align:right;font-size:12px;font-weight:700;color:var(--ink-soft)}

  /* QR */
  .qr-box{display:inline-block;background:#fff;padding:14px;border-radius:14px;border:1px solid var(--line)}
  canvas.qr{display:block;image-rendering:pixelated}

  /* live session (projector) */
  .projector{position:fixed;inset:0;background:var(--navy-950);color:#fff;z-index:100;display:flex;flex-direction:column}
  .proj-top{display:flex;justify-content:space-between;align-items:center;padding:18px 28px;border-bottom:1px solid rgba(255,255,255,.1)}
  .proj-body{flex:1;display:flex;align-items:center;justify-content:center;gap:6vw;padding:20px;flex-wrap:wrap;overflow:auto}
  .proj-qr{text-align:center}
  .proj-qr .qr-shell{background:#fff;padding:26px;border-radius:22px;box-shadow:0 30px 80px rgba(0,0,0,.5)}
  .proj-meta{margin-top:20px}
  .proj-meta .cd{font-size:14px;color:#9db3d4}
  .cd-bar{width:260px;height:6px;background:rgba(255,255,255,.15);border-radius:99px;margin:10px auto 0;overflow:hidden}
  .cd-fill{height:100%;background:#fff;border-radius:99px;transition:width 1s linear}
  .proj-roster{width:min(380px,90vw);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:16px;max-height:70vh;display:flex;flex-direction:column}
  .proj-roster header{padding:16px 18px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;justify-content:space-between;align-items:center}
  .proj-counts{display:flex;gap:22px;padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.1)}
  .proj-counts b{font-size:26px;display:block;line-height:1.1}
  .proj-counts span{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:#9db3d4}
  .proj-list{flex:1;overflow-y:auto;padding:8px 10px}
  .proj-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;animation:slideIn .3s ease}
  .proj-row:hover{background:rgba(255,255,255,.06)}
  .proj-row .t{margin-left:auto;font-size:11.5px;color:#9db3d4}
  @keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1}}

  /* scanner */
  .scanner{position:fixed;inset:0;background:#000;z-index:100;display:flex;flex-direction:column;color:#fff}
  .scan-view{flex:1;position:relative;background:radial-gradient(ellipse at center,#1a2a42 0%,#050b14 75%);display:flex;align-items:center;justify-content:center;overflow:hidden}
  .scan-frame{width:min(64vw,290px);aspect-ratio:1;border-radius:20px;position:relative}
  .scan-frame::before{content:'';position:absolute;inset:0;border-radius:20px;box-shadow:0 0 0 100vmax rgba(0,0,0,.55)}
  .scan-corner{position:absolute;width:38px;height:38px;border:4px solid #fff;border-radius:6px}
  .sc-tl{top:-2px;left:-2px;border-right:none;border-bottom:none}
  .sc-tr{top:-2px;right:-2px;border-left:none;border-bottom:none}
  .sc-bl{bottom:-2px;left:-2px;border-right:none;border-top:none}
  .sc-br{bottom:-2px;right:-2px;border-left:none;border-top:none}
  .scan-line{position:absolute;left:8%;right:8%;height:2.5px;background:linear-gradient(90deg,transparent,#7fd0ff,transparent);animation:scanmove 2.4s ease-in-out infinite}
  @keyframes scanmove{0%,100%{top:12%}50%{top:86%}}
  .scan-foot{padding:22px;text-align:center;background:#050b14}
  .scan-result{position:fixed;inset:0;z-index:110;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;animation:fadeIn .25s ease}
  .scan-result .big-ic{width:96px;height:96px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:46px;margin-bottom:22px;background:rgba(255,255,255,.18)}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}

  /* timetable */
  .tt{display:grid;grid-template-columns:64px repeat(6,1fr);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:#fff;min-width:760px}
  .tt>div{border-right:1px solid var(--line);border-bottom:1px solid var(--line);min-height:44px;font-size:12px;padding:5px}
  .tt .h{background:var(--navy-900);color:#fff;font-weight:700;text-align:center;padding:9px 4px;font-size:12.5px}
  .tt .time{background:var(--navy-50);color:var(--ink-soft);font-size:10.5px;text-align:right;padding:6px 7px;font-weight:600}
  .tt-class{background:var(--navy-100);border-left:3.5px solid var(--navy-700);border-radius:6px;padding:6px 8px;margin:2px;font-size:11px;line-height:1.35}
  .tt-class b{display:block;color:var(--navy-900);font-size:11.5px}
  .tt-class.lab{background:#e6f4f1;border-left-color:#0f766e}
  .tt-holiday{background:var(--amber-bg);border-left:3.5px solid var(--amber);border-radius:6px;padding:6px 8px;margin:2px;font-size:11px}

  /* modal / drawer / toast */
  .overlay{position:fixed;inset:0;background:rgba(8,26,51,.5);z-index:80;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .18s ease}
  .modal{background:#fff;border-radius:14px;width:100%;max-width:480px;max-height:88vh;overflow:auto;box-shadow:0 30px 80px rgba(0,0,0,.35)}
  .modal header{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .modal header h3{font-size:16px;color:var(--navy-900)}
  .modal .body{padding:22px}
  .modal footer{padding:14px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
  #toasts{position:fixed;bottom:22px;right:22px;z-index:200;display:flex;flex-direction:column;gap:10px}
  .toast{background:var(--navy-900);color:#fff;padding:12px 18px;border-radius:10px;box-shadow:var(--shadow);font-size:13.5px;display:flex;gap:10px;align-items:center;animation:slideIn .25s ease;max-width:340px}
  .toast.ok{border-left:4px solid #4ade80}
  .toast.err{border-left:4px solid #f87171}

  .empty{padding:44px 20px;text-align:center;color:var(--ink-soft)}
  .empty .ic{font-size:34px;margin-bottom:10px}
  .kv{display:grid;grid-template-columns:150px 1fr;gap:8px 16px;font-size:13.5px}
  .kv dt{color:var(--ink-soft);font-weight:600}
  .kv dd{color:var(--ink)}
  .banner-warn{background:var(--amber-bg);border:1px solid #f4dba4;color:var(--amber);border-radius:10px;padding:12px 16px;display:flex;gap:10px;align-items:flex-start;font-size:13.5px}
  .sync-ok{display:inline-flex;align-items:center;gap:6px;color:var(--green);font-weight:700;font-size:12.5px}
  .switch{position:relative;width:38px;height:21px;flex-shrink:0}
  .switch input{opacity:0;width:0;height:0}
  .switch .sl{position:absolute;inset:0;background:#c8d2e0;border-radius:99px;transition:.15s;cursor:pointer}
  .switch .sl::before{content:'';position:absolute;width:15px;height:15px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.15s}
  .switch input:checked + .sl{background:var(--navy-700)}
  .switch input:checked + .sl::before{transform:translateX(17px)}
  .tabs{display:flex;gap:4px;border-bottom:2px solid var(--line);margin-bottom:18px;overflow-x:auto}

function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg, kind='ok'){
  const t = document.createElement('div');

  t.innerHTML = (kind==='ok' ? '✔️ ' : '⚠️ ') + esc(msg);

  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='.3s'; setTimeout(()=>t.remove(), 320); }, 3400);
}
function clearTimers(){ S.timers.forEach(t=>clearInterval(t)); S.timers = []; }
function badge(status){
  const map = { PRESENT:['b-present','Present'], LATE:['b-late','Late'], ABSENT:['b-absent','Absent'], EXCUSED:['b-excused','Excused'],
    PENDING:['b-pending','Pending'], APPROVED:['b-approved','Approved'], REJECTED:['b-rejected','Rejected'],
    OPEN:['b-open','● Open'], REGULAR:['b-navy','Regular'], IRREGULAR:['b-late','Irregular'], TRANSFEREE:['b-excused','Transferee'],
    ACTIVE:['b-present','Active'], ON_LEAVE:['b-late','On leave'], SUCCESS:['b-present','Success'], PARTIAL:['b-late','Partial'], FAILED:['b-absent','Failed'],
    HOLIDAY:['b-absent','Holiday'], SUSPENSION:['b-late','Suspension'], MAKEUP_CLASS:['b-excused','Makeup class'], SPECIAL_EVENT:['b-navy','Special event'],
    FULL_TIME:['b-navy','Full-time'], PART_TIME:['b-gray','Part-time'], CRON:['b-gray','Cron'], MANUAL:['b-navy','Manual'] };
  const [cls, label] = map[status] || ['b-gray', status];
  return `<span class="badge ${cls}">${label}</span>`;
}
function ringSVG(pct, color='#19407c', size=120, sw=11){
  const r = (size - sw) / 2, c = 2 * Math.PI * r, off = c * (1 - pct/100);
  return `<div class="ring" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#e8eef7" stroke-width="${sw}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linecap="round"
        stroke-dasharray="${c}" stroke-dashoffset="${off}"/>
    </svg>
    <div class="pct">${pct}%<small>overall</small></div>
  </div>`;
}
/* fake QR: deterministic-random module grid with finder patterns */
function drawQR(canvas, seed){
  const n = 25, px = Math.floor(canvas.width / n);
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff'; ctx.fillRect(0,0,canvas.width,canvas.height);
  let s = seed >>> 0;
  const rnd = () => { s = (s * 1664525 + 1013904223) >>> 0; return s / 4294967296; };
  ctx.fillStyle = '#0b2447';
  const finder = (fx,fy) => {
    ctx.fillRect(fx*px, fy*px, 7*px, 7*px);
    ctx.fillStyle='#fff'; ctx.fillRect((fx+1)*px,(fy+1)*px,5*px,5*px);
    ctx.fillStyle='#0b2447'; ctx.fillRect((fx+2)*px,(fy+2)*px,3*px,3*px);
  };
  for(let y=0;y<n;y++) for(let x=0;x<n;x++){
    const inFinder = (x<8&&y<8)||(x>n-9&&y<8)||(x<8&&y>n-9);
    if(!inFinder && rnd() > .52) ctx.fillRect(x*px, y*px, px, px);
  }
  finder(0,0); finder(n-7,0); finder(0,n-7);
}
function qrBlock(id, size=180){
  return `<div class="qr-box"><canvas class="qr" id="${id}" width="${size}" height="${size}"></canvas></div>`;
}
function sparkBars(data, w=460, h=120, color='#19407c'){
  const max = Math.max(...data.map(d=>d.v));
  const bw = w / data.length;
  let bars='', labels='';
  data.forEach((d,i)=>{
    const bh = Math.max(4, (d.v/max) * (h-30));
    bars += `<rect x="${(i*bw+bw*0.18).toFixed(1)}" y="${(h-22-bh).toFixed(1)}" width="${(bw*0.64).toFixed(1)}" height="${bh.toFixed(1)}" rx="3.5" fill="${d.hi?color:'#c3d2e8'}"/>`;
    labels += `<text x="${(i*bw+bw/2).toFixed(1)}" y="${h-7}" font-size="10" fill="#5a6779" text-anchor="middle">${d.l}</text>`;
  });
  return `<svg class="chart-svg" viewBox="0 0 ${w} ${h}">${bars}${labels}</svg>`;
}
function lineChart(points, w=560, h=150, color='#19407c'){
  const min = Math.min(...points)-4, max = Math.max(...points)+2;
  const step = w / (points.length - 1);
  const y = v => 14 + (h-38) * (1 - (v-min)/(max-min));
  const pts = points.map((v,i)=>`${(i*step).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
  const area = `0,${h-24} ${pts} ${w},${h-24}`;
  return `<svg class="chart-svg" viewBox="0 0 ${w} ${h}">
    <polygon points="${area}" fill="rgba(25,64,124,.10)"/>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${points.map((v,i)=>`<circle cx="${(i*step).toFixed(1)}" cy="${y(v).toFixed(1)}" r="3.2" fill="#fff" stroke="${color}" stroke-width="2"/>`).join('')}
  </svg>`;
}

/* ------------------------- router ------------------------- */
const routes = {};
function route(path, fn){ routes[path] = fn; }
function nav(hash){ location.hash = hash; }
function currentPath(){
  const h = location.hash.replace(/^#/, '') || '/';
  return h;
}
function render(){
  clearTimers();
  document.body.classList.remove('side-open');
  let path = currentPath();
  // guards
  if(path.startsWith('/app') && !S.role){ location.hash = '/login'; return; }
  let fn = routes[path];
  let param = null;
  if(!fn){
    // dynamic segments
    const m1 = path.match(/^\/app\/classes\/(.+)$/);
    const m2 = path.match(/^\/app\/sessions\/(.+)\/live$/);
    const m3 = path.match(/^\/app\/students\/(.+)$/);
    if(m2){ fn = routes['/app/sessions/:id/live']; param = m2[1]; }
    else if(m1){ fn = routes['/app/classes/:id']; param = m1[1]; }
    else if(m3){ fn = routes['/app/students/:id']; param = m3[1]; }
  }
  if(!fn){ fn = routes['/404']; }
  fn(param);
  window.scrollTo(0,0);
}
window.addEventListener('hashchange', render);

    return `<a class="nav-item ${active?'active':''}" href="#${href}">

  let grid = `<div class="h"></div>` + days.map(d=>`<div class="h">${d}</div>`).join('');

route('/app/audit-logs', () => {
  const rows = DB.auditLogs.map((l,i) => `
    <tr style="cursor:pointer" onclick="auditDetail(${i})">
      <td class="small" style="white-space:nowrap">${l.at}</td>
      <td><b class="small">${l.actor}</b></td>
      <td><span class="badge b-gray mono" style="font-weight:600">${l.action}</span></td>
      <td class="small">${l.detail}</td>
      <td class="small muted mono">${l.entity}</td>
    </tr>`).join('');
  shell(`
    <div class="toolbar">
      <input type="search" placeholder="Search actor, entity, action…">
      <select class="filter-input"><option>All actions</option><option>attendance.override</option><option>settings.update</option><option>correction.approve</option><option>osas.sync</option></select>
      <input class="filter-input" type="date" value="2026-07-21">
      <span class="small muted">Click a row to view the before/after diff. Logs are append-only.</span>
    </div>
    <div class="table-wrap">
      <table><thead><tr><th>Timestamp</th><th>Actor</th><th>Action</th><th>Detail</th><th>Entity</th></tr></thead><tbody>${rows}</tbody></table>
      <div class="pagination"><span>1–6 of 8,412</span><button class="active">1</button><button>2</button><button>3</button><button>…</button></div>
    </div>`,
  { title:'Audit Logs', sub:'Every auth event, override, deletion, settings change, and sync — with actor, IP, before/after',
    crumbs:'<a href="#/app/dashboard">Home</a> / Audit logs' });
});
function auditDetail(i){
  const l = DB.auditLogs[i];
  modal(`Audit entry — ${l.action}`, `
    <div class="kv" style="margin-bottom:16px">
      <dt>Timestamp</dt><dd>${l.at} (Asia/Manila)</dd>
      <dt>Actor</dt><dd><b>${l.actor}</b> · <span class="mono small">10.10.4.121</span></dd>
      <dt>Entity</dt><dd class="mono small">${l.entity}</dd>
      <dt>Detail</dt><dd>${l.detail}</dd>
    </div>
    <div class="small muted" style="margin-bottom:6px">Before → After</div>
    <div class="audit-diff">${l.before?`<span class="del">- ${esc(l.before)}</span>\n`:''}<span class="add">+ ${esc(l.after)}</span></div>`,
    `<button class="btn btn-primary" onclick="closeModal()">Close</button>`);
}
